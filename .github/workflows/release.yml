name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to validate or publish, for example v1.0.1.2"
        required: false
        type: string
      publish:
        description: "Create or update the GitHub Release for the supplied tag"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  GHC_VERSION: "9.6.7"
  CABAL_VERSION: "latest"

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ env.GHC_VERSION }}
          cabal-version: ${{ env.CABAL_VERSION }}
          cabal-update: false

      - name: Check tag and Cabal version
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag || '' }}
          INPUT_PUBLISH: ${{ github.event.inputs.publish || 'false' }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            tag="$GITHUB_REF_NAME"
          elif [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          else
            cabal_version=$(sed -nE 's/^[[:space:]]*version:[[:space:]]*([^[:space:]]+).*/\1/p' bearilo.cabal | head -n 1)
            tag="v$cabal_version"
          fi

          if [ "$INPUT_PUBLISH" = "true" ] && [ -z "$INPUT_TAG" ] && [ "${GITHUB_REF_TYPE:-}" != "tag" ]; then
            echo "workflow_dispatch publishing requires an explicit tag input" >&2
            exit 1
          fi

          version="${tag#v}"
          if [[ "$version" =~ ^([0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?)([-.](alpha|beta|rc)[0-9A-Za-z.-]*)?$ ]]; then
            numeric_version="${BASH_REMATCH[1]}"
          else
            echo "Release tag must look like vX.Y.Z, vX.Y.Z.N, or a matching alpha/beta/rc prerelease: $tag" >&2
            exit 1
          fi

          cabal_version=$(sed -nE 's/^[[:space:]]*version:[[:space:]]*([^[:space:]]+).*/\1/p' bearilo.cabal | head -n 1)
          if [ -z "$cabal_version" ]; then
            echo "Could not read package version from bearilo.cabal" >&2
            exit 1
          fi

          expected_versions=("$numeric_version")
          if [[ "$numeric_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            expected_versions+=("$numeric_version.0")
          fi

          matches=false
          for expected in "${expected_versions[@]}"; do
            if [ "$cabal_version" = "$expected" ]; then
              matches=true
            fi
          done

          if [ "$matches" != "true" ]; then
            echo "Tag $tag does not match bearilo.cabal version $cabal_version" >&2
            echo "Accepted Cabal versions for this tag: ${expected_versions[*]}" >&2
            exit 1
          fi

          if [ "$INPUT_PUBLISH" = "true" ]; then
            git rev-parse -q --verify "refs/tags/$tag" >/dev/null || {
              echo "Tag $tag does not exist in this repository" >&2
              exit 1
            }
          fi

          prerelease=false
          if [[ "$version" =~ (alpha|beta|rc) ]]; then
            prerelease=true
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Extract release notes
        run: scripts/extract-changelog.sh "${{ steps.release.outputs.tag }}" CHANGELOG.md release-notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: release-notes.md
          if-no-files-found: error

  build:
    name: Build ${{ matrix.package_name }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package_name: bearilo-x86_64-linux
            archive_extension: tar.xz
            runner_arch: x86_64
          - os: macos-latest
            package_name: bearilo-aarch64-macos
            archive_extension: tar.xz
            runner_arch: arm64
          - os: macos-15-intel
            package_name: bearilo-x86_64-macos
            archive_extension: tar.xz
            runner_arch: x86_64
          - os: windows-latest
            package_name: bearilo-x86_64-windows
            archive_extension: zip
            runner_arch: AMD64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libxi-dev \
            libxtst-dev \
            libsdl2-dev \
            libsdl2-mixer-dev \
            pkg-config \
            xz-utils

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install pkg-config sdl2 sdl2_mixer

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bash = "C:\msys64\usr\bin\bash.exe"
          if (-not (Test-Path $bash)) {
            throw "MSYS2 bash was not found at $bash"
          }

          & $bash -lc "pacman -S --noconfirm --needed mingw-w64-x86_64-pkgconf mingw-w64-x86_64-SDL2 mingw-w64-x86_64-SDL2_mixer"
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "PKG_CONFIG_PATH=C:\msys64\mingw64\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ env.GHC_VERSION }}
          cabal-version: ${{ env.CABAL_VERSION }}
          cabal-update: false

      - name: Check runner architecture
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          actual_arch=$(uname -m)
          if [ "$actual_arch" != "${{ matrix.runner_arch }}" ]; then
            echo "Expected ${{ matrix.runner_arch }} but runner is $actual_arch" >&2
            exit 1
          fi

      - name: Check Windows runner architecture
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ($env:PROCESSOR_ARCHITECTURE -ne "${{ matrix.runner_arch }}") {
            throw "Expected ${{ matrix.runner_arch }} but runner is $env:PROCESSOR_ARCHITECTURE"
          }

      - name: Update Cabal package index
        run: cabal update

      - name: Build all targets
        run: cabal build all

      - name: Run tests
        run: cabal test all

      - name: Build release executable
        run: cabal build exe:bearilo

      - name: Package Unix archive
        if: runner.os != 'Windows'
        run: scripts/package-release.sh "${{ matrix.package_name }}"

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $packageName = "${{ matrix.package_name }}"
          $releaseDir = "dist\release"
          $stagingDir = Join-Path $releaseDir $packageName
          $archive = Join-Path $releaseDir "$packageName.zip"
          $binary = (cabal list-bin exe:bearilo).Trim()

          Remove-Item -Recurse -Force $stagingDir, $archive, "$archive.sha256" -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null

          Copy-Item $binary (Join-Path $stagingDir "bearilo.exe")
          foreach ($file in "README.md", "CHANGELOG.md", "LICENSE") {
            if (Test-Path $file) {
              Copy-Item $file $stagingDir
            }
          }

          $bash = "C:\msys64\usr\bin\bash.exe"
          $unixExe = (& $bash -lc "cygpath -u '$binary'").Trim()
          $lddCommand = "ldd '$unixExe' | awk '/\/mingw64\/bin/ { print `$3 }' | sort -u"
          $dlls = & $bash -lc $lddCommand
          foreach ($dll in $dlls) {
            if ([string]::IsNullOrWhiteSpace($dll)) {
              continue
            }
            $winDll = (& $bash -lc "cygpath -w '$dll'").Trim()
            Copy-Item $winDll $stagingDir -Force
          }

          Compress-Archive -Path $stagingDir -DestinationPath $archive -Force

          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "$archive.sha256" -Value "$hash  $packageName.zip" -Encoding ascii

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.package_name }}
          path: dist/release/${{ matrix.package_name }}.${{ matrix.archive_extension }}*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - validate
      - build
    if: ${{ (github.event_name == 'push' && github.ref_type == 'tag') || (github.event_name == 'workflow_dispatch' && inputs.publish == true && inputs.tag != '') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release artifacts
        run: find release-artifacts -maxdepth 2 -type f -print

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: ${{ needs.validate.outputs.tag }}
          body_path: release-artifacts/release-notes.md
          draft: false
          prerelease: ${{ needs.validate.outputs.prerelease }}
          fail_on_unmatched_files: true
          files: |
            release-artifacts/*.tar.xz
            release-artifacts/*.zip
            release-artifacts/*.sha256
