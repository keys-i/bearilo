name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GHC_VERSION: "9.6.7"

jobs:
  build:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libxi-dev \
            libxtst-dev \
            libsdl2-dev \
            libsdl2-mixer-dev \
            pkg-config

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install pkg-config sdl2 sdl2_mixer

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bash = "C:\msys64\usr\bin\bash.exe"
          if (-not (Test-Path $bash)) {
            throw "MSYS2 bash was not found at $bash"
          }

          & $bash -lc "pacman -S --noconfirm --needed mingw-w64-x86_64-pkgconf mingw-w64-x86_64-SDL2 mingw-w64-x86_64-SDL2_mixer"
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "PKG_CONFIG_PATH=C:\msys64\mingw64\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ env.GHC_VERSION }}
          cabal-version: latest
          cabal-update: false

      - name: Update Cabal package index
        run: cabal update

      - name: Build all targets
        run: cabal build all

      - name: Run tests
        run: cabal test all

  hlint:
    name: HLint
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ env.GHC_VERSION }}
          cabal-version: latest
          cabal-update: false

      - name: Update Cabal package index
        run: cabal update

      - name: Install HLint
        run: cabal install hlint

      - name: Run HLint
        run: hlint app src test
